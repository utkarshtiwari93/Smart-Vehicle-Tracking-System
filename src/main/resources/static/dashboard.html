<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTracker — Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
        }

        /* Navbar */
        .navbar {
            background: #1e293b;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .navbar h1 { color: #38bdf8; font-size: 20px; }
        .navbar span { color: #94a3b8; font-size: 14px; }

        .logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            background: #1e293b;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            background: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .tab.active {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            border-color: #38bdf8;
        }

        /* Content */
        .content { padding: 20px 24px; }

        /* Map */
        #map {
            height: 450px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        /* Speed Card */
        .speed-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid #334155;
        }

        .speed-number {
            font-size: 80px;
            font-weight: bold;
            color: #38bdf8;
            line-height: 1;
        }

        .speed-number.alert { color: #ef4444; }
        .speed-unit { color: #94a3b8; font-size: 18px; margin-top: 8px; }

        .speed-alert {
            background: #ef444420;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .info-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }

        .info-card .label { color: #94a3b8; font-size: 13px; margin-bottom: 8px; }
        .info-card .value { color: #f1f5f9; font-size: 18px; font-weight: bold; }

        /* History */
        .history-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        input[type="date"] {
            padding: 10px 14px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
        }

        .btn {
            padding: 10px 20px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        #historyMap {
            height: 400px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 16px;
        }

        .page { display: none; }
        .page.active { display: block; }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h1>🚗 SmartTracker</h1>
    <span><span class="status-dot"></span>Live Tracking</span>
    <div style="display:flex; align-items:center; gap:16px;">
        <span id="userName" style="color:#94a3b8; font-size:14px;"></span>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
</div>

<!-- Tabs -->
<div class="tabs">
    <div class="tab active" onclick="showTab('live')">🗺️ Live Map</div>
    <div class="tab" onclick="showTab('speed')">⚡ Speed Monitor</div>
    <div class="tab" onclick="showTab('history')">📜 Route History</div>
</div>

<!-- Live Map -->
<div class="content">
    <div class="page active" id="live">
        <div id="map"></div>
    </div>

    <!-- Speed Monitor -->
    <div class="page" id="speed">
        <div class="speed-card">
            <div class="speed-number" id="speedNumber">0</div>
            <div class="speed-unit">km/h</div>
        </div>
        <div class="speed-alert" id="speedAlert">
            🔴 Speed Limit Exceeded! Slow Down!
        </div>
        <div class="info-cards">
            <div class="info-card">
                <div class="label">📍 Latitude</div>
                <div class="value" id="latValue">—</div>
            </div>
            <div class="info-card">
                <div class="label">📍 Longitude</div>
                <div class="value" id="lngValue">—</div>
            </div>
            <div class="info-card">
                <div class="label">🕐 Last Updated</div>
                <div class="value" id="timeValue">—</div>
            </div>
            <div class="info-card">
                <div class="label">⚠️ Speed Limit</div>
                <div class="value">60 km/h</div>
            </div>
        </div>
    </div>

    <!-- Route History -->
    <div class="page" id="history">
        <div class="history-controls">
            <input type="date" id="historyDate" />
            <button class="btn" onclick="loadHistory()">Show Route</button>
        </div>
        <div id="historyMap"></div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/index.html';

    document.getElementById('userName').textContent = localStorage.getItem('name') || '';

    // Set today's date in history
    document.getElementById('historyDate').value = new Date().toISOString().split('T')[0];

    // Live Map Setup
    const map = L.map('map').setView([25.4358, 81.8463], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const marker = L.marker([25.4358, 81.8463]).addTo(map)
        .bindPopup('🚗 Vehicle').openPopup();

    // Polling — Har 5 Second Mein Update
    async function fetchLatest() {
        try {
            const res = await fetch('/api/location/latest', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (res.status === 403) {
                logout();
                return;
            }

            const data = await res.json();
            if (!data || !data.latitude) return;

            const lat = data.latitude;
            const lng = data.longitude;
            const speed = data.speed || 0;
            const time = new Date(data.timestamp).toLocaleTimeString();

            // Map Update
            marker.setLatLng([lat, lng]);
            map.setView([lat, lng], 15);
            marker.bindPopup(`🚗 Speed: ${speed} km/h`).openPopup();

            // Speed Update
            document.getElementById('speedNumber').textContent = Math.round(speed);
            document.getElementById('latValue').textContent = lat.toFixed(5);
            document.getElementById('lngValue').textContent = lng.toFixed(5);
            document.getElementById('timeValue').textContent = time;

            // Speed Alert
            const speedAlert = document.getElementById('speedAlert');
            const speedNumber = document.getElementById('speedNumber');
            if (speed > 60) {
                speedAlert.style.display = 'block';
                speedNumber.classList.add('alert');
            } else {
                speedAlert.style.display = 'none';
                speedNumber.classList.remove('alert');
            }

        } catch (e) {
            console.log('Fetch error:', e);
        }
    }

    fetchLatest();
    setInterval(fetchLatest, 5000);

    // History Map
    let historyMap = L.map('historyMap').setView([25.4358, 81.8463], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(historyMap);

    async function loadHistory() {
        const date = document.getElementById('historyDate').value;
        const start = date + 'T00:00:00';
        const end = date + 'T23:59:59';

        const res = await fetch(
            `/api/location/history?start=${start}&end=${end}`,
            { headers: { 'Authorization': 'Bearer ' + token } }
        );

        const data = await res.json();
        if (!data || data.length === 0) {
            alert('No history found for this date!');
            return;
        }

        const coords = data.map(d => [d.latitude, d.longitude]);

        // Clear old layers
        historyMap.eachLayer(layer => {
            if (!(layer instanceof L.TileLayer)) historyMap.removeLayer(layer);
        });

        // Draw Route Line
        L.polyline(coords, { color: '#38bdf8', weight: 4 }).addTo(historyMap);

        // Start & End Markers
        L.marker(coords[0]).addTo(historyMap).bindPopup('🟢 Start').openPopup();
        L.marker(coords[coords.length - 1]).addTo(historyMap).bindPopup('🔴 End');

        historyMap.fitBounds(coords);
    }

    // Tabs
    function showTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');

        // History map resize fix
        if (tab === 'history') setTimeout(() => historyMap.invalidateSize(), 100);
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/index.html';
    }
</script>
</body>
</html>
